# 「爆款制造机」字段 schema

[[fields]]
name = "对标素材链接"
type = "text"
source = "meta.url"

# 原始视频文件（附件）
# - download 命令在 sink=feishu 时自动保留原视频并把路径回填到 meta.video_path
# - 首次启用时需在飞书表格里手动加这一列（类型选「附件」），位置建议放在「对标素材链接」之后
# - 飞书附件单文件 ≤2GB；超出会自动跳过该附件，其它字段照常写入
[[fields]]
name = "原始素材"
type = "attachment"
source = "meta.video_path"

[[fields]]
name = "标题"
type = "text"
source = "meta.title"

[[fields]]
name = "作者名"
type = "text"
source = "meta.author"

[[fields]]
name = "文案提取"
type = "text"
source = "lines | joined"

[[fields]]
name = "摘要"
type = "text"
source = "analyses.summary.text"

[[fields]]
name = "核心要点"
type = "text"
source = "analyses.summary.points | joined"

[[fields]]
name = "标签"
type = "text"
source = "analyses.summary.tags | tags_hashtag"

[[fields]]
name = "开场钩子"
type = "text"
source = "analyses.breakdown.hook"

[[fields]]
name = "核心信息"
type = "text"
source = "analyses.breakdown.core"

[[fields]]
name = "行动召唤"
type = "text"
source = "analyses.breakdown.cta"

[[fields]]
name = "亮点"
type = "text"
source = "analyses.breakdown.pros | joined"

[[fields]]
name = "优化建议"
type = "text"
source = "analyses.breakdown.suggestions | joined"

[[fields]]
name = "视频拆解全文"
type = "text"
source = "analyses.breakdown.text"

[[fields]]
name = "二创改写"
type = "text"
source = "analyses.rewrite.text"

[[fields]]
name = "改写内核"
type = "text"
source = "analyses.rewrite._meta.thinking"

[[fields]]
name = "改写字数比值"
type = "text"
source = "analyses.rewrite._meta.比值"

[[fields]]
name = "视频时长"
type = "text"
source = "meta.duration_str"

[[fields]]
name = "播放数"
type = "text"
source = "meta.view"

[[fields]]
name = "点赞数"
type = "text"
source = "meta.like"

[[fields]]
name = "收藏数"
type = "text"
source = "meta.favorite"

[[fields]]
name = "分享数"
type = "text"
source = "meta.share"

[[fields]]
name = "评论数"
type = "text"
source = "meta.reply"

[[fields]]
name = "数据汇总"
type = "text"
source = "meta | stats_compact"

[[fields]]
name = "下载链接"
type = "text"
source = "meta.url"

[[fields]]
name = "封面链接"
type = "text"
source = "meta.thumbnail"

[[fields]]
name = "发布时间"
type = "datetime"
source = "meta.upload_date"

[[fields]]
name = "提取时间"
type = "datetime"
source = "meta.extract_time"